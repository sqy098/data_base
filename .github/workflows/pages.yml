name: Deploy football dashboard to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build and validate workbook data
        run: |
          python -m pip install --disable-pip-version-check openpyxl==3.1.5
          python scripts/build_workbook_data.py 'data/足球比赛自动分析台账.xlsx' site/workbook --download-dir site/files
          python scripts/build_dashboard_data.py 'data/足球比赛自动分析台账.xlsx' site/data.js
          node scripts/smoke_test.cjs site/data.js site/app.js

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
